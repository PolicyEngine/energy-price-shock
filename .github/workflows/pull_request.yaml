name: Pull request

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff format check
        run: uvx ruff format --check .
      - name: Ruff lint
        run: uvx ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install
        run: uv pip install --system -e .[dev]
      - name: Pytest
        run: pytest tests/ -v

  dashboard-build:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        working-directory: dashboard
        run: bun install --frozen-lockfile || bun install
      - name: Build
        working-directory: dashboard
        run: bun run build
